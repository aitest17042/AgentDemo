<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業登入 - HSBC 滙豐銀行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#EE3524',
                        neutral: '#F5F7FA',
                        dark: '#231F20',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-neutral min-h-screen flex items-center justify-center font-sans p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm p-8 relative">
            <!-- 返回上一頁 -->
            <button onclick="history.back()" class="absolute top-5 left-5 text-gray-400 hover:text-gray-700">
                <i class="fa fa-arrow-left mr-1"></i> 返回
            </button>

            <div class="text-center mb-6">
                <div class="text-center mt-6">
                        <img src="https://www.business.hsbc.com.hk/-/media/new-logos/svg/traditional-chinese-rgb.svg?iar=0&hash=9C4263346BF2D4FF0318A248A60DA1FF" alt="HSBC Logo" class="h-8 mx-auto">
                </div>
                <p class="text-gray-500 text-sm mt-4">登入商務「網上理財」服務</p>
            </div>

            <div id="errorMsg" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4 text-center">
                帳號或密碼錯誤，請重新輸入
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">使用者名稱</label>
                    <input id="username" type="text" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" placeholder="請輸入使用者名稱">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">登入密碼</label>
                    <input id="password" type="password" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" placeholder="請輸入密碼">
                </div>

                <button onclick="login()" class="w-full bg-primary text-white py-2.5 rounded-lg font-medium hover:bg-primary/90 transition-colors">
                    登入企業服務
                </button>

                <p class="text-xs text-gray-400 text-center">
                    測試帳號：admin<br>
                    測試密碼：admin
                </p>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (username === 'admin' && password === 'admin') {
                localStorage.setItem('hsbcLogin', 'true');
                window.location.href = 'app.html';
            } else {
                errorMsg.classList.remove('hidden');
            }
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
