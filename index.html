<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>HSBC Business AI Assistant</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var standaloneRequested =
          window.location.protocol === 'file:' ||
          new URLSearchParams(window.location.search).has('standalone');

        function loadStandaloneApp() {
          if (document.documentElement.dataset.bootMode === 'standalone') {
            return;
          }

          document.documentElement.dataset.bootMode = 'standalone';
          document.body.dataset.standalone = 'true';

          var stylesheet = document.createElement('link');
          stylesheet.rel = 'stylesheet';
          stylesheet.href = './standalone/styles.css';
          document.head.appendChild(stylesheet);

          var script = document.createElement('script');
          script.src = './standalone/app.js';
          document.body.appendChild(script);
        }

        if (standaloneRequested) {
          loadStandaloneApp();
          return;
        }

        var appScript = document.createElement('script');
        appScript.type = 'module';
        appScript.src = '/src/main.tsx';
        appScript.addEventListener('error', loadStandaloneApp);
        document.body.appendChild(appScript);
      })();
    </script>
  </body>
</html>
